# Winenu 포트폴리오 기술 스택 정규화 사전
# 용도: 포트폴리오 질문 태깅 시 기술명 정규화, 취약점 프로파일 집계
# 구조: group (고정 카테고리) > canonical tech entries (정규화된 기술 목록)
#
# 태깅 규칙:
#   1. LLM은 canonical_key 목록에서 매칭되는 기술을 선택
#   2. aliases에 해당하는 표현이 나오면 canonical_key로 정규화
#   3. 목록에 없는 기술은 _unknown_ 접두사를 붙여 새 키를 제안
#      예: _unknown_supabase

groups:
  - id: language
    name: 프로그래밍 언어

  - id: framework
    name: 서버/애플리케이션 프레임워크

  - id: frontend
    name: 프론트엔드 라이브러리/프레임워크

  - id: runtime
    name: 런타임

  - id: persistence
    name: ORM / 데이터 접근 기술

  - id: database
    name: 데이터베이스

  - id: cache
    name: 캐시/인메모리 저장소

  - id: messaging
    name: 메시징/이벤트 시스템

  - id: communication
    name: API/통신 프로토콜

  - id: infra
    name: 인프라/서버/컨테이너

  - id: cloud
    name: 클라우드 플랫폼

  - id: cloud_service
    name: 클라우드 세부 서비스

  - id: cicd
    name: 배포/자동화

  - id: observability
    name: 로깅/모니터링/트레이싱

  - id: testing
    name: 테스트 도구

